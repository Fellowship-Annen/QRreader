<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Android / PWA -->
  <link rel="manifest" href="./manifest.json">
  <!-- iOS -->
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <!-- favicon -->
  <link rel="icon" href="./favicon.ico">
  <link rel="icon" sizes="192x192" href="./icon-192.png">
  <link rel="icon" sizes="512x512" href="./icon-512.png">
  <meta name="theme-color" content="#ffffff">

  <!-- テーマカラー（Androidの上部バー色） -->
  <meta name="theme-color" content="#ffffff">
  <title>フィラメントQR読取</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; margin: 0; }
    .wrap { padding: 16px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { padding: 10px 14px; font-size: 16px; }
    .status { margin-top: 10px; padding: 10px; background: #f3f3f3; border-radius: 8px; white-space: pre-wrap; }
    .card { margin-top: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
    .grid { display: grid; grid-template-columns: 110px 1fr; gap: 6px 10px; align-items: baseline; }
    .label { color: #555; }
    .value { font-weight: 600; }
    .weight { font-size: 20px; font-weight: 800; }
    .hidden { display: none !important; }
    .searchPanel { margin-top: 12px; }
    .searchFields { display: grid; gap: 12px; }
    .searchField { display: grid; gap: 5px; }
    .searchField label { color: #555; font-size: 14px; font-weight: 700; }
    .searchField select {
      width: 100%; padding: 10px; border: 1px solid #bbb; border-radius: 8px;
      background: #fff; font-size: 16px;
    }
    .searchActions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
    .searchPrimary { border: 0; border-radius: 8px; background: #1677ff; color: #fff; font-weight: 800; }
    .searchResults { margin-top: 14px; display: grid; gap: 8px; }
    .searchResultRow { padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
    .searchResultId { font-size: 17px; font-weight: 800; }
    .searchResultDetails { margin-top: 5px; color: #444; line-height: 1.6; }
    .searchResultSummary { font-weight: 800; }

    /* camera layer */
    #cameraLayer {
      position: fixed; inset: 0; background: #000; z-index: 9999;
      display: flex; flex-direction: column;
    }
    #video {
      width: 100%; height: 100%; object-fit: cover; flex: 1;
      background: #000;
    }
    #camBar {
      position: absolute; left: 0; right: 0; bottom: 0;
      display: flex; gap: 10px; padding: 12px;
      background: linear-gradient(transparent, rgba(0,0,0,.65));
    }
    #camBar button { flex: 1; }
    #hint {
      position: absolute; left: 12px; right: 12px; top: 12px;
      color: #fff; background: rgba(0,0,0,.45);
      padding: 10px; border-radius: 10px; font-size: 14px;
    }
    /* 追加:20260212 */
    .simTitle{
      margin-top: 10px;
      padding: 8px 10px;
      background: #f7f7f7;
      border-radius: 10px;
      font-weight: 800;
    }
    .formAction{
      margin-top: 10px;
    }
    .openFormBtn{
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: #1677ff;
      color: #fff;
      font-weight: 800;
    }
    .simControls{
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }
    .simControlsTitle{
      color: #555;
      font-size: 14px;
    }
    .simChecks{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .simCheck{
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      font-size: 16px;
      font-weight: 700;
    }
    .simCheck input{
      width: 18px;
      height: 18px;
    }
    .simList{
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }
    .simRow{
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 0.7fr;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fff;
    }
    .simHead{
      font-size: 12px;
      color: #666;
    }
    .simVal{
      font-weight: 700;
    }
    .simTotal{
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff6d6;
      font-weight: 900;
      font-size: 18px;
    }
    #scanFrame {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(72vw, 320px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 3px solid rgba(255,255,255,.95);
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.22);
      pointer-events: none;
    }
    #scanFrame::before,
    #scanFrame::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 3px solid rgba(22,119,255,.95);
      border-left-color: transparent;
      border-right-color: transparent;
      pointer-events: none;
    }
    #scanFrame::after {
      transform: rotate(90deg);
    }
  </style>
</head>
<body>
  <div class="wrap" id="mainLayer">
    <h2 style="margin: 0 0 10px;">フィラメントQR読取</h2>

    <div class="row">
      <button id="btnStartCam" disabled>カメラ起動</button>
      <button id="btnOpenSearch" disabled>フィラメント検索</button>
      <button id="btnReloadCsv">データ更新</button>
    </div>

    <div class="status" id="status">起動中…</div>

    <div class="card hidden" id="resultCard">
      <div style="display:flex; justify-content:space-between; gap:10px; align-items:center;">
        <div>
          <div style="font-size:14px; color:#666;">管理番号</div>
          <div class="value" id="resId" style="font-size:18px;"></div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:14px; color:#666;">重量（g）</div>
          <div class="weight" id="resWeight">-</div>
        </div>
      </div>
      <div class="formAction">
        <button id="btnOpenForm" class="openFormBtn hidden">フォームを開く</button>
      </div>
      <hr style="border:none; border-top:1px solid #eee; margin:10px 0;">
      <div class="grid">
        <div class="label">メーカー</div><div class="value" id="resMaker">-</div>
        <div class="label">母材</div><div class="value" id="resBase">-</div>
        <div class="label">色</div><div class="value" id="resColor">-</div>
        <div class="label">保管場所</div><div class="value" id="resLoc">-</div>
      </div>
      <!-- 同一フィラメント一覧 追加:20260212 -->
      <div id="similarSection" class="hidden" style="margin-top:14px;">
        <div class="simTitle">同じ種類のフィラメント</div>
        <div class="simControls">
          <div class="simControlsTitle">保管場所</div>
          <div id="similarLocationFilters" class="simChecks">
            <label class="simCheck"><input type="checkbox" name="similarLocation" value="ALL">ALL</label>
            <label class="simCheck"><input type="checkbox" name="similarLocation" value="さんらいず">さんらいず</label>
            <label class="simCheck"><input type="checkbox" name="similarLocation" value="オーシャン">オーシャン</label>
            <label class="simCheck"><input type="checkbox" name="similarLocation" value="フォージー">フォージー</label>
          </div>
        </div>

        <div id="similarList" class="simList"></div>

        <div class="simTotal">
          重量 合計（g）: <span id="similarTotalWeight">0</span>
        </div>
      </div>
    </div>

    <div class="card searchPanel hidden" id="searchPanel">
      <div class="searchFields">
        <div class="searchField">
          <label for="searchMaker">メーカー</label>
          <select id="searchMaker"><option value="">選択してください</option></select>
        </div>
        <div class="searchField">
          <label for="searchBase">母材（ベース）</label>
          <select id="searchBase" disabled><option value="">メーカーを選択してください</option></select>
        </div>
        <div class="searchField">
          <label for="searchColor">色</label>
          <select id="searchColor" disabled><option value="">母材を選択してください</option></select>
        </div>
        <div class="searchField">
          <label for="searchLocation">保管場所</label>
          <select id="searchLocation">
            <option value="ALL">ALL</option>
            <option value="フォージー">フォージー</option>
            <option value="オーシャン">オーシャン</option>
            <option value="さんらいず">さんらいず</option>
          </select>
        </div>
      </div>
      <div class="searchActions">
        <button id="btnCloseSearch">戻る</button>
        <button id="btnRunSearch" class="searchPrimary" disabled>表示</button>
      </div>
      <div id="searchResults" class="searchResults hidden"></div>
    </div>
  </div>

  <!-- Camera layer -->
  <div id="cameraLayer" class="hidden">
    <video id="video" playsinline></video>
    <div id="scanFrame"></div>
    <div id="hint">QRコードをカメラに写してください（認識したら自動で停止します）</div>
    <div id="camBar">
      <button id="btnStopCam">カメラ停止</button>
    </div>
    <canvas id="canvas" class="hidden"></canvas>
  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    /**********************
     * 設定（あなたの条件）
     **********************/
    const ENTRY_KEY = "entry.268306040";

    // CSV 取得URL（export 方式）
    const CSV_URL =
      "https://docs.google.com/spreadsheets/d/15UGqdqOwVQNx9qY02HtZIaqrD6Kd1dwmWuj4p3EGIGg/export?format=csv&gid=93776902";

    // ループ間隔（ms）: 200〜500 の範囲
    const SCAN_INTERVAL_MS = 300;
    const LAST_RESULT_STORAGE_KEY = "filamentQrLastResult";
    const LOCATION_OPTIONS = ["さんらいず", "オーシャン", "フォージー"];

    /**********************
     * 状態
     **********************/
    let csvRows = [];          // [{管理番号:..., メーカー:..., ...}, ...]
    let csvLoaded = false;

    let stream = null;
    let scanning = false;
    let scanTimer = null;
    let currentFormUrl = "";
    let currentSimilarBaseId = "";
    let currentSimilarBaseRow = null;

    /**********************
     * UI参照
     **********************/
    const statusEl = document.getElementById("status");
    const btnStartCam = document.getElementById("btnStartCam");
    const btnOpenSearch = document.getElementById("btnOpenSearch");
    const btnReloadCsv = document.getElementById("btnReloadCsv");
    const searchPanel = document.getElementById("searchPanel");
    const searchMaker = document.getElementById("searchMaker");
    const searchBase = document.getElementById("searchBase");
    const searchColor = document.getElementById("searchColor");
    const searchLocation = document.getElementById("searchLocation");
    const btnCloseSearch = document.getElementById("btnCloseSearch");
    const btnRunSearch = document.getElementById("btnRunSearch");
    const searchResults = document.getElementById("searchResults");

    const cameraLayer = document.getElementById("cameraLayer");
    const mainLayer = document.getElementById("mainLayer");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const btnStopCam = document.getElementById("btnStopCam");

    const resultCard = document.getElementById("resultCard");
    const btnOpenForm = document.getElementById("btnOpenForm");
    const resId = document.getElementById("resId");
    const resMaker = document.getElementById("resMaker");
    const resBase = document.getElementById("resBase");
    const resColor = document.getElementById("resColor");
    const resLoc = document.getElementById("resLoc");
    const resWeight = document.getElementById("resWeight");//追加:20260212
    const similarSection = document.getElementById("similarSection");//追加:20260212
    const similarList = document.getElementById("similarList");//追加:20260212
    const similarLocationFilters = document.getElementById("similarLocationFilters");
    const similarLocationInputs = Array.from(document.querySelectorAll('input[name="similarLocation"]'));
    const similarTotalWeight = document.getElementById("similarTotalWeight");//追加:20260212


    /**********************
     * ユーティリティ
     **********************/
    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function showResultCard(show) {
      resultCard.classList.toggle("hidden", !show);
    }

    function setOpenFormUrl(url) {
      currentFormUrl = String(url ?? "").trim();
      btnOpenForm.classList.toggle("hidden", !currentFormUrl);
    }

    function getSelectedLocations() {
      const selected = similarLocationInputs
        .filter(input => input.checked)
        .map(input => input.value);

      return selected.length ? selected : ["ALL"];
    }

    function setSelectedLocations(locations) {
      const selected = Array.isArray(locations) ? locations.map(normText) : [normText(locations)];
      const useAll = selected.includes("ALL") || selected.length === 0;

      for (const input of similarLocationInputs) {
        input.checked = useAll ? input.value === "ALL" : selected.includes(input.value);
      }
    }

    function setDefaultLocationFilter(row) {
      const loc = normText(getField(row, ["保管場所"]));
      setSelectedLocations(LOCATION_OPTIONS.includes(loc) ? [loc] : ["ALL"]);
    }

    function normalizeLocationFilterChange(changedInput) {
      if (changedInput.value === "ALL" && changedInput.checked) {
        for (const input of similarLocationInputs) {
          input.checked = input.value === "ALL";
        }
        return;
      }

      if (changedInput.value !== "ALL" && changedInput.checked) {
        const allInput = similarLocationInputs.find(input => input.value === "ALL");
        if (allInput) allInput.checked = false;
      }

      if (!similarLocationInputs.some(input => input.checked)) {
        setSelectedLocations(["ALL"]);
      }
    }

    function saveLastResult() {
      if (!currentSimilarBaseId || !currentFormUrl) return;

      try {
        sessionStorage.setItem(LAST_RESULT_STORAGE_KEY, JSON.stringify({
          id: currentSimilarBaseId,
          formUrl: currentFormUrl,
          locations: getSelectedLocations()
        }));
      } catch (e) {
        console.warn(e);
      }
    }

    function restoreLastResult() {
      let saved = null;

      try {
        saved = JSON.parse(sessionStorage.getItem(LAST_RESULT_STORAGE_KEY) || "null");
      } catch (e) {
        console.warn(e);
      }

      if (!saved || !saved.id) return false;

      const row = findRowById(saved.id);
      if (!row) return false;

      renderRow(saved.id, row, saved.formUrl || "", saved.locations || null);
      return true;
    }

    function uniqueSortedValues(rows, candidates) {
      return [...new Set(rows.map(row => normText(getField(row, candidates))).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ja"));
    }

    function setSelectOptions(select, values, placeholder) {
      select.innerHTML = "";
      const first = document.createElement("option");
      first.value = "";
      first.textContent = placeholder;
      select.appendChild(first);

      for (const value of values) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      }
    }

    function resetSearchResults() {
      searchResults.innerHTML = "";
      searchResults.classList.add("hidden");
    }

    function initializeFilamentSearch() {
      setSelectOptions(searchMaker, uniqueSortedValues(csvRows, ["メーカー"]), "選択してください");
      setSelectOptions(searchBase, [], "メーカーを選択してください");
      setSelectOptions(searchColor, [], "母材を選択してください");
      searchBase.disabled = true;
      searchColor.disabled = true;
      btnRunSearch.disabled = true;
      resetSearchResults();
    }

    function rowsMatchingSearch(maker, base, color = "") {
      return csvRows.filter(row =>
        normText(getField(row, ["メーカー"])) === maker &&
        normText(getField(row, ["母材(ベース)", "母材"])) === base &&
        (!color || normText(getField(row, ["色"])) === color)
      );
    }

    function renderFilamentSearchResults() {
      const maker = normText(searchMaker.value);
      const base = normText(searchBase.value);
      const color = normText(searchColor.value);
      const location = normText(searchLocation.value);
      const matches = rowsMatchingSearch(maker, base, color).filter(row => {
        const weight = getField(row, ["重量（ｇ）", "重量（g）", "重量(g)", "重量"]);
        const matchesLocation = location === "ALL" ||
          normText(getField(row, ["保管場所"])) === location;

        return matchesLocation && parseWeightToNumber(weight) > 0;
      });

      searchResults.innerHTML = "";
      searchResults.classList.remove("hidden");

      const summary = document.createElement("div");
      summary.className = "searchResultSummary";
      summary.textContent = `検索結果: ${matches.length}件`;
      searchResults.appendChild(summary);

      if (!matches.length) {
        const empty = document.createElement("div");
        empty.className = "searchResultRow";
        empty.textContent = "条件に一致するフィラメントはありません。";
        searchResults.appendChild(empty);
        return;
      }

      for (const row of matches) {
        const item = document.createElement("div");
        item.className = "searchResultRow";

        const id = document.createElement("div");
        id.className = "searchResultId";
        id.textContent = `管理番号: ${sanitizeId(getField(row, ["管理番号(半角)", "管理番号"])) || "-"}`;

        const details = document.createElement("div");
        details.className = "searchResultDetails";
        const weight = sanitizeWeight(getField(row, ["重量（ｇ）", "重量（g）", "重量(g)", "重量"]));
        details.textContent = [
          `メーカー: ${normText(getField(row, ["メーカー"])) || "-"}`,
          `母材: ${normText(getField(row, ["母材(ベース)", "母材"])) || "-"}`,
          `色: ${normText(getField(row, ["色"])) || "-"}`,
          `保管場所: ${normText(getField(row, ["保管場所"])) || "-"}`,
          `重量（g）: ${weight || "-"}`
        ].join(" / ");

        item.append(id, details);
        searchResults.appendChild(item);
      }
    }

    function sanitizeId(id) {
      // 念のため前後空白除去（完全一致前提だけど安全策）
      return String(id ?? "").trim();
    }

    function sanitizeWeight(w) {
      // 数字・小数点・カンマ以外を除去（念のため）
      const s = String(w ?? "").trim();
      return s.replace(/[^0-9.,]/g, "");
    }

    function isProbablyMobile() {
      // ざっくり判定（要件：スマホ/タブレット中心）
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function extractEntryValueFromUrl(urlStr) {
      try {
        const u = new URL(urlStr);
        const v = u.searchParams.get(ENTRY_KEY);
        return v ? v : null;
      } catch {
        return null;
      }
    }
    //フィラメント一覧追加関数　追加:20260212
    function getField(row, candidates) {
      for (const k of candidates) {
        if (row && row[k] != null && String(row[k]).trim() !== "") return row[k];
      }
      return "";
    }


    function parseWeightToNumber(v) {
      // 数字/小数点/カンマ以外除去 → カンマ除去 → 数値化
      const s = sanitizeWeight(v);        // 既存の sanitizeWeight を利用
      const n = parseFloat(s.replace(/,/g, ""));
      return Number.isFinite(n) ? n : 0;
    }


    function findRowById(id) {
      const target = sanitizeId(id);
      // 管理番号列で完全一致（trim込み）
      return csvRows.find(r => sanitizeId(r["管理番号(半角)"]) === target) || null;
    }

    function renderRow(id, row, formUrl, selectedLocations) {
      resId.textContent = sanitizeId(id);
      setOpenFormUrl(formUrl);

      // 表示項目
      resMaker.textContent = row["メーカー"] ?? "-";
      resBase.textContent  = row["母材(ベース)"] ?? row["母材"] ?? "-"; // 念のため表記ゆれ吸収
      resColor.textContent = row["色"] ?? "-";
      resLoc.textContent   = row["保管場所"] ?? "-";

      // 必須：重量
      const w = sanitizeWeight(row["重量（ｇ）"] ?? row["重量(g)"] ?? row["重量"] ?? "");
      resWeight.textContent = w ? w : "（未設定）";

      showResultCard(true);
      if (selectedLocations) {
        setSelectedLocations(selectedLocations);
      } else {
        setDefaultLocationFilter(row);
      }
      renderSimilarList(id, row);//追加:20260212

    }

    /**********************
     * CSV読み込み
     **********************/
    async function loadCsv() {
      csvLoaded = false;
      btnStartCam.disabled = true;
      btnOpenSearch.disabled = true;
      showResultCard(false);

      setStatus("CSVを取得しています…");

      try {
        const res = await fetch(CSV_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("CSV取得失敗: HTTP " + res.status);
        const text = await res.text();

        const parsed = Papa.parse(text, {
          header: true,
          skipEmptyLines: true
        });

        if (parsed.errors && parsed.errors.length) {
          console.warn(parsed.errors);
        }

        csvRows = parsed.data || [];
        csvLoaded = true;
        btnStartCam.disabled = false;
        btnOpenSearch.disabled = false;
        initializeFilamentSearch();

        setStatus(
          "CSV取得OK ✅\n" +
          `件数: ${csvRows.length}\n` +
          (isProbablyMobile() ? "端末: モバイル判定" : "端末: PC判定（動作はします）")
        );
        restoreLastResult();
      } catch (e) {
        console.error(e);
        setStatus(
          "データを取得できませんでした ❌\n" +
          "ネット接続や共有設定を確認してください。\n\n" +
          "「データ更新」を押して再試行できます。"
        );
      }
    }

    /**********************
     * カメラ起動/停止
     **********************/
    async function startCamera() {
      if (!csvLoaded) {
        setStatus("先にCSV取得が必要です。");
        return;
      }

      // カメラが使えるか
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("カメラが見つかりません（getUserMedia非対応）");
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        // layer切り替え
        cameraLayer.classList.remove("hidden");
        mainLayer.classList.add("hidden");

        scanning = true;
        loopScan();

      } catch (e) {
        console.error(e);
        setStatus("カメラを起動できませんでした。権限やHTTPSを確認してください。");
      }
    }

    function stopCamera() {
      scanning = false;
      if (scanTimer) {
        clearTimeout(scanTimer);
        scanTimer = null;
      }

      if (video) {
        try { video.pause(); } catch {}
        video.srcObject = null;
      }

      if (stream) {
        for (const t of stream.getTracks()) t.stop();
        stream = null;
      }

      // layer切り替え
      cameraLayer.classList.add("hidden");
      mainLayer.classList.remove("hidden");
    }

    function loopScan() {
      if (!scanning) return;

      // videoがまだ準備できてない場合は待つ
      if (video.readyState < 2) {
        scanTimer = setTimeout(loopScan, SCAN_INTERVAL_MS);
        return;
      }

      const w = video.videoWidth;
      const h = video.videoHeight;

      if (w === 0 || h === 0) {
        scanTimer = setTimeout(loopScan, SCAN_INTERVAL_MS);
        return;
      }

      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(video, 0, 0, w, h);

      const img = ctx.getImageData(0, 0, w, h);
      const code = jsQR(img.data, w, h);

      if (code && code.data) {
        const urlStr = code.data;
        const id = extractEntryValueFromUrl(urlStr);

        // 認識したら自動停止（仕様）
        stopCamera();

        if (!id) {
          setStatus("認識できないQRです（必要なクエリが見つかりません）");
          showResultCard(false);
          return;
        }

        const row = findRowById(id);
        if (!row) {
          setStatus(`データが見つかりません（管理番号: ${sanitizeId(id)}）`);
          showResultCard(false);
          return;
        }

        setStatus(`検索OK ✅（管理番号: ${sanitizeId(id)}）`);
        renderRow(id, row, urlStr);
        return;
      }

      scanTimer = setTimeout(loopScan, SCAN_INTERVAL_MS);
    }

    /**********************
     * イベント
     **********************/
    btnStartCam.addEventListener("click", startCamera);
    btnOpenSearch.addEventListener("click", () => {
      resultCard.classList.add("hidden");
      searchPanel.classList.remove("hidden");
      btnOpenSearch.disabled = true;
    });
    btnCloseSearch.addEventListener("click", () => {
      searchPanel.classList.add("hidden");
      btnOpenSearch.disabled = !csvLoaded;
      if (currentSimilarBaseRow) resultCard.classList.remove("hidden");
    });
    searchMaker.addEventListener("change", () => {
      const maker = normText(searchMaker.value);
      const rows = csvRows.filter(row => normText(getField(row, ["メーカー"])) === maker);
      setSelectOptions(searchBase, uniqueSortedValues(rows, ["母材(ベース)", "母材"]), maker ? "選択してください" : "メーカーを選択してください");
      setSelectOptions(searchColor, [], "母材を選択してください");
      searchBase.disabled = !maker;
      searchColor.disabled = true;
      btnRunSearch.disabled = true;
      resetSearchResults();
    });
    searchBase.addEventListener("change", () => {
      const maker = normText(searchMaker.value);
      const base = normText(searchBase.value);
      const rows = base ? rowsMatchingSearch(maker, base) : [];
      setSelectOptions(searchColor, uniqueSortedValues(rows, ["色"]), base ? "選択してください" : "母材を選択してください");
      searchColor.disabled = !base;
      btnRunSearch.disabled = true;
      resetSearchResults();
    });
    searchColor.addEventListener("change", () => {
      btnRunSearch.disabled = !searchColor.value;
      resetSearchResults();
    });
    searchLocation.addEventListener("change", resetSearchResults);
    btnRunSearch.addEventListener("click", renderFilamentSearchResults);
    btnStopCam.addEventListener("click", () => {
      stopCamera();
      setStatus("カメラを停止しました。");
    });
    btnReloadCsv.addEventListener("click", loadCsv);
    btnOpenForm.addEventListener("click", () => {
      if (currentFormUrl) {
        saveLastResult();
        window.location.href = currentFormUrl;
      }
    });
    similarLocationFilters.addEventListener("change", (event) => {
      if (event.target && event.target.name === "similarLocation") {
        normalizeLocationFilterChange(event.target);
      }

      if (currentSimilarBaseRow) {
        renderSimilarList(currentSimilarBaseId, currentSimilarBaseRow);
        saveLastResult();
      }
    });

    // 初回ロード
    loadCsv();

    //同一フィラメント表示関数を追加:20260212
    // ついでに正規化を少し強める（全角スペース対策など）
    function normText(v) {
      return String(v ?? "")
        .replace(/\u3000/g, " ")   // 全角スペース→半角
        .replace(/\s+/g, " ")     // 連続空白を1つに
        .trim();
    }

    function renderSimilarList(baseId, baseRow) {
      currentSimilarBaseId = sanitizeId(baseId);
      currentSimilarBaseRow = baseRow;

      // 基準行の特徴（完全一致）
      const baseMaker = normText(getField(baseRow, ["メーカー"]));
      const baseBase  = normText(getField(baseRow, ["母材(ベース)", "母材"]));
      const baseColor = normText(getField(baseRow, ["色"]));
      const baseLoc   = normText(getField(baseRow, ["保管場所"]));
      const selectedLocs = getSelectedLocations();
      const isAllLocations = selectedLocs.includes("ALL");
      const selectedLabel = isAllLocations ? "ALL" : selectedLocs.join("、");

      // 基準行の重量（合計に含める）
      const baseWeightRaw = getField(baseRow, ["重量（ｇ）", "重量(g)", "重量"]);
      let total = isAllLocations || selectedLocs.includes(baseLoc)
        ? parseWeightToNumber(baseWeightRaw)
        : 0;

      // 同一条件の行を抽出（ただし基準行は一覧から除外）
      const sameKind = csvRows.filter(r => {
        const id = sanitizeId(getField(r, ["管理番号(半角)", "管理番号"]));
        if (id === sanitizeId(baseId)) return false;

        const maker = normText(getField(r, ["メーカー"]));
        const mat   = normText(getField(r, ["母材(ベース)", "母材"]));
        const color = normText(getField(r, ["色"]));
        const loc   = normText(getField(r, ["保管場所"]));
        const matchesLocation = isAllLocations || selectedLocs.includes(loc);

        return maker === baseMaker && mat === baseBase && color === baseColor && matchesLocation;
      });

      const matches = sameKind.filter(r => {
        const wRaw = getField(r, ["重量（ｇ）", "重量（g）", "重量(g)", "重量（G）", "重量"]);
        const wNum = parseWeightToNumber(wRaw);
        return wNum > 0; // ✅ ここで0除外
      });



      // ✅ ここから表示
      similarList.innerHTML = "";
      similarSection.classList.remove("hidden");

      // ✅ “ヒット数”を必ず出す（まず切り分け最優先）
      setStatus(
        `検索OK ✅（管理番号: ${sanitizeId(baseId)}）\n` +
        `保管場所: ${selectedLabel}\n` +
        `同種ヒット: ${matches.length}件`
      );

      if (matches.length === 0) {
        // 0件でも動いてるのが分かるように出す
        const line = document.createElement("div");
        line.className = "simRow";
        line.innerHTML = `
          <div class="simVal">該当なし</div>
          <div class="simVal">-</div>
          <div class="simVal">-</div>
        `;
        similarList.appendChild(line);
        similarTotalWeight.textContent = String(total); // 合計は基準行のみ
        return;
      }

      for (const r of matches) {
        const id = sanitizeId(getField(r, ["管理番号(半角)", "管理番号"]));
        const loc = normText(getField(r, ["保管場所"]));
        const wRaw = getField(r, ["重量（ｇ）", "重量(g)", "重量"]);
        const wDisp = sanitizeWeight(wRaw);

        total += parseWeightToNumber(wRaw);

        const line = document.createElement("div");
        line.className = "simRow";
        const idEl = document.createElement("div");
        const locEl = document.createElement("div");
        const weightEl = document.createElement("div");

        idEl.className = "simVal";
        locEl.className = "simVal";
        weightEl.className = "simVal";

        idEl.textContent = id || "-";
        locEl.textContent = loc || "-";
        weightEl.textContent = wDisp || "-";

        line.appendChild(idEl);
        line.appendChild(locEl);
        line.appendChild(weightEl);
        similarList.appendChild(line);
      }

      similarTotalWeight.textContent = String(total);
    }



  </script>
</body>
